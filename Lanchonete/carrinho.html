<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css" />
    <title>Meu Carrinho - Sonic Burguer</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-sonic shadow-sm py-3 mb-5">
      <div class="container d-flex justify-content-between">
        <a class="navbar-brand" href="index.html">
          <img src="assets/logo.png" alt="Logo Sonic Burguer" height="150" />
        </a>
        <a href="index.html" class="btn btn-warning rounded-pill px-4 fw-bold shadow-sm btn-carrinho">Voltar ao Cardápio</a>
      </div>
    </nav>

    <div class="container bg-white p-4 rounded-4 shadow-sm mb-5">
      <h2 class="fw-bold mb-4 text-primary">Seu Carrinho 🛒</h2>

      <div id="lista-itens-carrinho"></div>

      <hr class="my-4" />

    <div class="d-flex flex-column flex-md-row justify-content-between align-items-center mt-4 pt-4 border-top gap-3">
      <div class="text-center text-md-start">
        <span class="fs-4 fw-bold text-dark">Total:</span>
        <span class="fs-3 fw-bold text-success ms-2" id="valor-total">R$ 0,00</span>
      </div>
      <button class="btn btn-success btn-lg px-5 rounded-pill fw-bold shadow-sm w-100" style="max-width: 300px;" onclick="finalizarCompra()">
        Pagar Agora 💵
      </button>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="carrinho.js"></script>
  </body>
</html>
