<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
    <title>Meu Carrinho - Sonic Burguer</title>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg navbar-sonic shadow-sm py-3 mb-5">
      <div class="container d-flex justify-content-between">
        <a class="navbar-brand" href="index.html">
          <img src="assets/logo.png" alt="Logo Sonic Burguer" height="150" />
        </a>
        <a
          href="index.html"
          class="btn btn-warning rounded-pill px-4 fw-bold shadow-sm"
          >Voltar ao Cardápio</a
        >
      </div>
    </nav>

    <div class="container bg-white p-4 rounded-4 shadow-sm mb-5">
      <h2 class="fw-bold mb-4 text-danger">Seu Carrinho 🛒</h2>

      <div id="lista-itens-carrinho"></div>

      <hr class="my-4" />

      <div class="d-flex justify-content-between align-items-center">
        <h3 class="fw-bold m-0">
          Total: <span id="valor-total" class="text-success">R$ 0,00</span>
        </h3>
        <button
          class="btn btn-success btn-lg fw-bold px-5 rounded-pill shadow-sm"
          onclick="finalizarCompra()"
        >
          Pagar Agora 💵
        </button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="carrinho.js"></script>
  </body>
</html>
